<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GRID-OS // MASTER_BUILD</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --bg: #050505;
            --surface: #121212;
            --border: #2a2a2a;
            --accent: #00ff41;
            --text: #888;
            --font: "Courier New", monospace;
            --win-w: 800px;
            --win-h: 500px;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            background: var(--bg);
            color: var(--text);
            font-family: var(--font);
            font-size: 0.9rem;
            height: 100vh;
            overflow: hidden;
        }

        #desktop {
            width: 100vw;
            height: calc(100vh - 40px);
            position: relative;
        }

        /* WINDOW */
        .window {
            position: absolute;
            width: var(--win-w);
            height: var(--win-h);
            background: var(--surface);
            border: 1px solid var(--border);
            display: none;
            flex-direction: column;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8);
            z-index: 1;
            resize: both;
            overflow: hidden;
            min-width: 300px;
            min-height: 200px;
        }

        .window-header {
            background: #1a1a1a;
            padding: 8px 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            color: #fff;
            user-select: none;
            cursor: move;
        }

            .window-header strong {
                font-weight: 600;
            }

        .window-content {
            flex: 1;
            background: #000;
            position: relative;
            overflow: auto;
            /* Dod iekšējām lapām max-size safety */
            max-width: 100%;
            max-height: 100%;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* TASKBAR */
        #taskbar {
            height: 40px;
            background: #000;
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 10px;
            gap: 8px;
            position: fixed;
            bottom: 0;
            width: 100%;
            z-index: 9999;
        }

        .dock-app {
            padding: 4px 10px;
            border: 1px solid var(--border);
            font-size: 0.65rem;
            cursor: pointer;
            background: #111;
            color: #fff;
            border-radius: 4px;
            transition: 0.2s ease;
        }

            .dock-app:hover {
                border-color: var(--accent);
                color: var(--accent);
            }

            .dock-app.active {
                border-color: var(--accent);
                color: var(--accent);
                background: #1a1a1a;
                font-weight: 600;
            }
    </style>
</head>
<body>

    <div id="desktop">
        <div id="window-layer"></div>
    </div>

    <div id="taskbar">
        <div style="font-weight:bold; color:var(--accent); margin-right:10px;">GRID</div>
        <!-- App buttons will be added here -->
    </div>

    <script>
        /*
         * GRID‑OS MASTER_BUILD:
         * - Skaidri nosaukta app saraksta struktūra
         * - Daudz tīrāka JS logika, ar labāku z‑index, focus, UI
         */

        const apps = [
            { name: "NEO-ULTRA AI", file: "NEO-1.html" },
            { name: "PORTAL 99", file: "portal 99.html" },
            { name: "DASHBOARD", file: "dashboard.html" },
            { name: "FOOD PLACE", file: "Food Place.html" },
            { name: "GAMES", file: "games.html" },
            { name: "MUSIC", file: "music.html" },
            { name: "STEALTH", file: "stealth.html" },
            { name: "STORE", file: "store.html" },
            { name: "TERMINAL", file: "terminal.html" },
            { name: "VAULT", file: "Vault.html" }
        ];

        const windowLayer = document.getElementById("window-layer");
        const taskbar = document.getElementById("taskbar");
        let zIndex = 100;

        /**
         * Open window by ID
         */
        function openWindow(winId) {
            const win = document.getElementById(winId);
            const btn = document.querySelector(`[data-win="${winId}"]`);

            if (!win) return;

            win.style.display = "flex";
            win.style.zIndex = ++zIndex;

            if (btn) {
                btn.classList.add("active");
            }
        }

        /**
         * Close window by ID
         */
        function closeWindow(winId) {
            const win = document.getElementById(winId);
            const btn = document.querySelector(`[data-win="${winId}"]`);

            if (!win) return;

            win.style.display = "none";

            if (btn) {
                btn.classList.remove("active");
            }
        }

        /**
         * Create draggable window (header only)
         */
        function makeDraggable(win) {
            const header = win.querySelector(".window-header");

            header.onmousedown = function (e) {
                if (e.target.tagName === "BUTTON") return;

                win.style.zIndex = ++zIndex;

                const sx = e.clientX - win.offsetLeft;
                const sy = e.clientY - win.offsetTop;

                function move(m) {
                    win.style.left = `${m.clientX - sx}px`;
                    win.style.top = `${m.clientY - sy}px`;
                }

                function stop() {
                    document.onmousemove = null;
                    document.onmouseup = null;
                }

                document.onmousemove = move;
                document.onmouseup = stop;
            };
        }

        /**
         * Create app window + taskbar button
         */
        apps.forEach((app, index) => {
            const winId = `win-${index}`;

            // 1. Taskbar button
            const btn = document.createElement("div");
            btn.className = "dock-app";
            btn.innerText = app.name;
            btn.dataset.win = winId;
            btn.onclick = () => openWindow(winId);
            taskbar.appendChild(btn);

            // 2. Window
            const win = document.createElement("div");
            win.className = "window";
            win.id = winId;

            // Lag windows slightly offset for a “layered” feel
            const offsetX = 40 + index * 15;
            const offsetY = 40 + index * 15;

            win.style.top = `${offsetY}px`;
            win.style.left = `${offsetX}px`;

            win.innerHTML = `
                    <div class="window-header">
                        <span><strong>SYS_CORE</strong> // ${app.name}</span>
                        <button
                            onclick="closeWindow('${winId}')"
                            style="background:none; border:none; color:red; cursor:pointer;"
                            aria-label="Close window"
                        >
                            X
                        </button>
                    </div>
                    <div class="window-content">
                        <iframe src="${app.file}" title="${app.name}"></iframe>
                    </div>
                `;

            windowLayer.appendChild(win);
            makeDraggable(win);
        });

        // Optional: click anywhere on window gives it top z-index
        document.addEventListener("click", (e) => {
            const win = e.target.closest(".window");
            if (win && win.style.display !== "none") {
                win.style.zIndex = ++zIndex;
            }
        });
    </script>
</body>
</html>
