<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>UCN | Ultimate Custom Night HTML</title>
    <style>
        :root {
            --ucn-orange: #ff8c00;
            --ucn-blue: #0066ff;
        }

        body {
            margin: 0;
            background: #000;
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
            user-select: none;
        }

        /* MENU SYSTEM */
        .screen {
            position: absolute;
            inset: 0;
            display: none;
            flex-direction: column;
        }

        .active {
            display: flex;
        }

        #roster-screen {
            background: #111;
            overflow-y: auto;
            padding: 20px;
            align-items: center;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(5, 120px);
            gap: 10px;
            margin-top: 20px;
        }

        .char-card {
            width: 120px;
            height: 150px;
            background: #222;
            border: 2px solid #444;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

            .char-card.active {
                border-color: var(--ucn-orange);
                box-shadow: 0 0 10px var(--ucn-orange);
            }

        .ai-level {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--ucn-orange);
            margin-top: 5px;
        }

        .char-icon {
            font-size: 3rem;
            margin-top: 10px;
        }

        /* OFFICE SYSTEM */
        #office-view {
            width: 100vw;
            height: 100vh;
            background: #050505;
            position: relative;
            overflow: hidden;
            display: none;
        }

        #office-inner {
            width: 200vw;
            height: 100vh;
            position: absolute;
            left: -50vw;
            background: linear-gradient(90deg, #111 0%, #222 50%, #111 100%);
            display: flex;
            justify-content: space-around;
            align-items: center;
            transition: transform 0.1s;
        }

        /* INTERACTABLES */
        .door {
            width: 150px;
            height: 400px;
            background: #333;
            border: 5px solid #111;
            position: relative;
            transition: 0.2s;
        }

            .door.closed {
                background: #555;
                transform: translateY(0);
            }

            .door.open {
                transform: translateY(-380px);
            }

        /* HUD */
        #hud {
            position: fixed;
            bottom: 0;
            width: 100%;
            height: 100px;
            background: rgba(0,0,0,0.8);
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 1000;
            border-top: 2px solid #333;
        }

        .meter {
            text-align: center;
            font-family: monospace;
        }

        .val {
            font-size: 1.5rem;
            color: #0f0;
        }

        /* JUMPSCARE */
        #scare {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 9999;
            display: none;
            align-items: center;
            justify-content: center;
            font-size: 10rem;
        }
    </style>
</head>
<body>

    <div id="roster-screen" class="screen active">
        <h1 style="color: var(--ucn-orange); letter-spacing: 5px;">ULTIMATE CUSTOM NIGHT</h1>
        <div class="grid" id="char-grid"></div>
        <div style="margin-top: 30px;">
            <button onclick="startGame()" style="padding: 15px 50px; background: var(--ucn-orange); border: none; font-weight: bold; cursor: pointer;">GO!</button>
        </div>
    </div>

    <div id="office-view">
        <div id="office-inner">
            <div id="left-door" class="door open"></div>
            <div id="center-desk" style="width: 400px; text-align: center;">
                <div id="fan-icon" style="font-size: 3rem;">🌀</div>
                <p>TEMP: <span id="temp-display">60</span>°</p>
            </div>
            <div id="right-door" class="door open"></div>
        </div>

        <div id="hud">
            <div class="meter">POWER<br><span class="val" id="p-power">100</span>%</div>
            <div class="meter">NOISE<br><span class="val" id="p-noise">0</span></div>
            <div class="meter">TIME<br><span class="val" id="p-time">12:00 AM</span></div>
        </div>
    </div>

    <div id="scare">🐻</div>

    <script>
        /** --- CHARACTER DATA --- **/
        const chars = [
            { id: 0, name: "Freddy", icon: "🐻", ai: 0 },
            { id: 1, name: "Bonnie", icon: "🐰", ai: 0 },
            { id: 2, name: "Chica", icon: "🐥", ai: 0 },
            { id: 3, name: "Foxy", icon: "🦊", ai: 0 },
            { id: 4, name: "Puppet", icon: "🎭", ai: 0 },
            { id: 5, name: "BB", icon: "🎈", ai: 0 },
            { id: 6, name: "Mangle", icon: "⛓️", ai: 0 },
            { id: 7, name: "Springtrap", icon: "🐰", ai: 0 },
            { id: 8, name: "Baby", icon: "🤡", ai: 0 },
            { id: 9, name: "Ennard", icon: "🤖", ai: 0 }
        ];

        /** --- ROSTER INIT --- **/
        const grid = document.getElementById('char-grid');
        chars.forEach(c => {
            const card = document.createElement('div');
            card.className = 'char-card';
            card.innerHTML = `
                <div class="char-icon">${c.icon}</div>
                <div class="ai-level" id="ai-val-${c.id}">${c.ai}</div>
                <div style="display:flex; gap:5px;">
                    <button onclick="adjustAI(${c.id}, -1)">-</button>
                    <button onclick="adjustAI(${c.id}, 1)">+</button>
                </div>
            `;
            grid.appendChild(card);
        });

        function adjustAI(id, amt) {
            chars[id].ai = Math.max(0, Math.min(20, chars[id].ai + amt));
            document.getElementById(`ai-val-${id}`).innerText = chars[id].ai;
        }

        /** --- GAME LOGIC --- **/
        let gameActive = false;
        let stats = { power: 100, temp: 60, noise: 0, time: 0, fan: true, leftDoor: false, rightDoor: false };

        function startGame() {
            document.getElementById('roster-screen').classList.remove('active');
            document.getElementById('office-view').style.display = 'block';
            gameActive = true;
            gameLoop();
        }

        function gameLoop() {
            if (!gameActive) return;

            // 1. Resource Consumption
            let drain = 0.05;
            if (stats.fan) { drain += 0.05; stats.temp = Math.max(60, stats.temp - 0.1); } else { stats.temp += 0.08; }
            if (stats.leftDoor) drain += 0.15;
            if (stats.rightDoor) drain += 0.15;

            stats.power -= drain;
            stats.noise = (stats.fan ? 20 : 0) + (stats.leftDoor ? 10 : 0);

            // 2. AI Ticks (Every 5 seconds)
            if (Math.floor(Date.now() / 1000) % 5 === 0) {
                chars.forEach(c => {
                    if (c.ai > 0) {
                        let roll = Math.random() * 20;
                        if (roll < c.ai) triggerAIAction(c.id);
                    }
                });
            }

            // 3. UI Update
            updateUI();

            if (stats.power <= 0) jumpscare("POWER OUTAGE");
            if (stats.temp >= 120) jumpscare("OVERHEAT");

            requestAnimationFrame(gameLoop);
        }

        function triggerAIAction(id) {
            console.log("AI " + id + " moved!");
            // Simplified: If Freddy (0) moves and door is open, you die
            if (id === 0 && !stats.leftDoor) jumpscare("FREDDY");
        }

        function updateUI() {
            document.getElementById('p-power').innerText = Math.floor(stats.power);
            document.getElementById('p-noise').innerText = stats.noise;
            document.getElementById('temp-display').innerText = Math.floor(stats.temp);
            document.getElementById('temp-display').style.color = stats.temp > 100 ? 'red' : '#0f0';
        }

        /** --- INPUTS --- **/
        window.addEventListener('keydown', e => {
            if (!gameActive) return;
            if (e.key === 'a') { stats.leftDoor = !stats.leftDoor; document.getElementById('left-door').className = stats.leftDoor ? 'door closed' : 'door open'; }
            if (e.key === 'd') { stats.rightDoor = !stats.rightDoor; document.getElementById('right-door').className = stats.rightDoor ? 'door closed' : 'door open'; }
            if (e.key === 'f') { stats.fan = !stats.fan; document.getElementById('fan-icon').style.opacity = stats.fan ? "1" : "0.2"; }
        });

        window.addEventListener('mousemove', e => {
            if (!gameActive) return;
            let x = (e.clientX / window.innerWidth) - 0.5;
            document.getElementById('office-inner').style.transform = `translateX(${-x * 50}vw)`;
        });

        function jumpscare(who) {
            gameActive = false;
            const s = document.getElementById('scare');
            s.innerText = "👻";
            s.style.display = 'flex';
            setTimeout(() => location.reload(), 3000);
        }

    </script>
</body>
</html>
