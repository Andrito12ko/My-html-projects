<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEO-ULTRA | Live Neural Link</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/highlight.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/atom-one-dark.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #0d0d0d;
            --bg-secondary: #1a1a1a;
            --sidebar: #000000;
            --ai-bubble: #1f1f2e;
            --user-bubble: #2a2a3e;
            --accent: #10a37f;
            --accent-light: #2ba084;
            --text: #ececf1;
            --text-secondary: #8b8b9a;
            --border: #333333;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', 'Sora', sans-serif;
            display: flex;
        }

        /* SIDEBAR */
        #sidebar {
            width: 260px;
            background: var(--sidebar);
            border-right: 1px solid var(--border);
            padding: 20px;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }

        .sidebar-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
            color: var(--accent);
        }

            .sidebar-header span {
                font-weight: bold;
                font-size: 0.9rem;
            }

        .new-chat {
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text);
            padding: 12px 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 500;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

            .new-chat:hover {
                background: var(--bg-secondary);
                border-color: var(--accent);
                color: var(--accent);
            }

        .chat-history {
            margin-top: 30px;
            flex: 1;
            overflow-y: auto;
        }

        .chat-item {
            padding: 12px;
            margin-bottom: 8px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            color: var(--text-secondary);
            transition: all 0.2s ease;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

            .chat-item:hover {
                background: var(--bg-secondary);
                color: var(--text);
            }

        .sidebar-footer {
            margin-top: auto;
            padding-top: 20px;
            border-top: 1px solid var(--border);
            font-size: 0.75rem;
            color: var(--text-secondary);
        }

        .status-indicator {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: var(--accent);
            border-radius: 50%;
            margin-right: 6px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 1;
            }

            50% {
                opacity: 0.5;
            }
        }

        /* MAIN STAGE */
        #main-stage {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        #chat-scroller {
            flex: 1;
            overflow-y: auto;
            padding: 40px 0;
            scroll-behavior: smooth;
        }

            #chat-scroller::-webkit-scrollbar {
                width: 8px;
            }

            #chat-scroller::-webkit-scrollbar-track {
                background: transparent;
            }

            #chat-scroller::-webkit-scrollbar-thumb {
                background: var(--accent);
                border-radius: 4px;
            }

        /* MESSAGES */
        .message-row {
            padding: 20px 10%;
            display: flex;
            gap: 20px;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .ai-row {
            background: linear-gradient(to right, var(--ai-bubble) 0%, transparent 100%);
            border-top: 1px solid rgba(16, 163, 127, 0.1);
            border-bottom: 1px solid rgba(16, 163, 127, 0.1);
        }

        .user-row {
            justify-content: flex-end;
        }

            .user-row .avatar,
            .user-row .content {
                order: 2;
            }

            .user-row .content {
                text-align: right;
            }

        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            flex-shrink: 0;
            font-size: 1.2rem;
        }

        .u-av {
            background: linear-gradient(135deg, #667eea, #764ba2);
        }

        .n-av {
            background: linear-gradient(135deg, var(--accent), var(--accent-light));
            color: white;
        }

        .content {
            flex: 1;
            max-width: 70%;
            line-height: 1.6;
            word-wrap: break-word;
        }

            .content p {
                margin: 12px 0;
            }

            .content h1, .content h2, .content h3 {
                margin: 16px 0 12px 0;
                color: var(--accent);
            }

            .content strong {
                color: var(--accent);
            }

            .content a {
                color: var(--accent);
                text-decoration: none;
                transition: 0.2s;
            }

                .content a:hover {
                    text-decoration: underline;
                }

            .content pre {
                background: #000;
                padding: 16px;
                border-radius: 8px;
                overflow-x: auto;
                border: 1px solid var(--border);
                margin: 12px 0;
                position: relative;
            }

            .content code {
                color: #00f2ff;
                font-family: 'Courier New', monospace;
            }

        .code-block {
            position: relative;
        }

        .copy-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: var(--accent);
            color: #000;
            border: none;
            padding: 8px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.75rem;
            font-weight: bold;
            transition: all 0.2s;
            opacity: 0;
        }

        .code-block:hover .copy-btn {
            opacity: 1;
        }

        .copy-btn:hover {
            background: var(--accent-light);
        }

        /* TYPING INDICATOR */
        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 12px 0;
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            background: var(--accent);
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }

            .typing-dot:nth-child(2) {
                animation-delay: 0.2s;
            }

            .typing-dot:nth-child(3) {
                animation-delay: 0.4s;
            }

        @keyframes typing {
            0%, 60%, 100% {
                opacity: 0.3;
                transform: translateY(0);
            }

            30% {
                opacity: 1;
                transform: translateY(-10px);
            }
        }

        /* INPUT CONTAINER */
        #input-container {
            padding: 30px 10%;
            background: linear-gradient(to top, var(--bg), transparent);
            flex-shrink: 0;
        }

        .input-pill {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            padding: 16px 24px;
            border-radius: 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: all 0.3s ease;
        }

            .input-pill:focus-within {
                border-color: var(--accent);
                box-shadow: 0 0 20px rgba(16, 163, 127, 0.1);
            }

        #user-input {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text);
            font-size: 1rem;
            outline: none;
            font-family: inherit;
        }

            #user-input::placeholder {
                color: var(--text-secondary);
            }

        .send-btn {
            background: var(--accent);
            color: #000;
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            transition: all 0.2s;
            flex-shrink: 0;
        }

            .send-btn:hover {
                background: var(--accent-light);
                transform: scale(1.1);
            }

            .send-btn:active {
                transform: scale(0.95);
            }

        /* LOADING STATE */
        .loading {
            display: none;
            margin: 20px 10%;
            color: var(--accent);
            font-size: 0.85rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 10px;
        }

            .loading.show {
                display: flex;
            }

        /* WELCOME MESSAGE */
        .welcome-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            text-align: center;
        }

        .welcome-icon {
            font-size: 4rem;
            margin-bottom: 20px;
        }

        .welcome-title {
            font-size: 2rem;
            margin-bottom: 10px;
            color: var(--accent);
        }

        .welcome-desc {
            color: var(--text-secondary);
            font-size: 0.95rem;
        }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            #sidebar {
                width: 200px;
                padding: 15px;
            }

            .message-row {
                padding: 15px 5%;
            }

            .content {
                max-width: 100%;
            }

            #input-container {
                padding: 20px 5%;
            }
        }
    </style>
</head>
<body>

    <!-- SIDEBAR -->
    <div id="sidebar">
        <div class="sidebar-header">
            <span>⚡ NEO-ULTRA</span>
        </div>

        <button class="new-chat" onclick="startNewChat()">+ New Chat</button>

        <div class="chat-history" id="chat-history"></div>

        <div class="sidebar-footer">
            <p><span class="status-indicator"></span>Status: Connected</p>
            <p style="margin-top: 8px;">v2.0 Neural Link</p>
        </div>
    </div>

    <!-- MAIN STAGE -->
    <div id="main-stage">
        <div id="chat-scroller">
            <div id="welcome-msg" class="welcome-container">
                <div class="welcome-icon">🧠</div>
                <div class="welcome-title">NEO-ULTRA</div>
                <div class="welcome-desc">Advanced AI Neural Link<br>Ask me anything...</div>
            </div>
        </div>

        <div class="loading" id="status">
            <div class="typing-indicator">
                <div class="typing-dot"></div>
                <div class="typing-dot"></div>
                <div class="typing-dot"></div>
            </div>
            <span>Neural processing...</span>
        </div>

        <div id="input-container">
            <div class="input-pill">
                <input type="text" id="user-input" placeholder="Type your query..." autofocus>
                <button class="send-btn" onclick="sendMessage()">→</button>
            </div>
        </div>
    </div>

    <script>
        const input = document.getElementById('user-input');
        const scroller = document.getElementById('chat-scroller');
        const status = document.getElementById('status');
        const welcomeMsg = document.getElementById('welcome-msg');
        const chatHistory = document.getElementById('chat-history');

        let messages = [
            { role: "system", content: "You are NEO-ULTRA, a professional, high-level AI assistant. You provide concise, expert-level answers and write clean code. Be helpful, clear, and accurate." }
        ];

        let chatSessions = [];
        let currentSessionId = Date.now();

        // Send message on Enter or button click
        input.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && input.value.trim()) {
                sendMessage();
            }
        });

        function sendMessage() {
            const query = input.value.trim();
            if (!query) return;

            input.value = "";
            chatWithAI(query);
        }

        async function chatWithAI(query) {
            // Hide welcome message
            if (welcomeMsg) welcomeMsg.style.display = 'none';

            // Add user message
            addMessage('user', query);
            messages.push({ role: "user", content: query });

            status.classList.add('show');
            scroller.scrollTop = scroller.scrollHeight;

            try {
                const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": "Bearer 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",
                        "Content-Type": "application/json",
                        "HTTP-Referer": "http://localhost",
                        "X-Title": "NEO-ULTRA Interface"
                    },
                    body: JSON.stringify({
                        "model": "google/gemini-2.0-flash-exp:free",
                        "messages": messages
                    })
                });

                const data = await response.json();

                if (data.choices && data.choices[0]) {
                    const aiText = data.choices[0].message.content;
                    status.classList.remove('show');
                    addMessage('assistant', aiText, true);
                    messages.push({ role: "assistant", content: aiText });

                    // Save to history
                    saveToHistory(query);
                } else {
                    throw new Error("Invalid response from API");
                }

            } catch (err) {
                status.classList.remove('show');
                addMessage('assistant', "### ⚠️ Neural Link Failed\n\nI couldn't reach the AI engine. Please:\n- Check your internet connection\n- Verify your API key\n- Try again in a moment");
                console.error(err);
            }
        }

        function addMessage(role, text, isMarkdown = false) {
            const row = document.createElement('div');
            row.className = `message-row ${role === 'assistant' ? 'ai-row' : 'user-row'}`;

            const avatar = document.createElement('div');
            avatar.className = `avatar ${role === 'user' ? 'u-av' : 'n-av'}`;
            avatar.innerText = role === 'user' ? 'U' : 'N';

            const content = document.createElement('div');
            content.className = 'content';

            if (role === 'assistant' && isMarkdown) {
                content.innerHTML = marked.parse(text);

                // Add copy buttons to code blocks
                content.querySelectorAll('pre').forEach(pre => {
                    pre.classList.add('code-block');
                    const code = pre.textContent;
                    const btn = document.createElement('button');
                    btn.className = 'copy-btn';
                    btn.textContent = 'Copy';
                    btn.onclick = () => {
                        navigator.clipboard.writeText(code);
                        btn.textContent = 'Copied!';
                        setTimeout(() => btn.textContent = 'Copy', 2000);
                    };
                    pre.appendChild(btn);
                });
            } else {
                content.textContent = text;
            }

            row.appendChild(avatar);
            row.appendChild(content);
            scroller.appendChild(row);

            setTimeout(() => {
                scroller.scrollTop = scroller.scrollHeight;
            }, 50);
        }

        function saveToHistory(query) {
            chatSessions.push(query.substring(0, 50));
            updateHistoryUI();
            localStorage.setItem('neo-chat-history', JSON.stringify(chatSessions));
        }

        function updateHistoryUI() {
            chatHistory.innerHTML = chatSessions.map((chat, idx) =>
                `<div class="chat-item" onclick="alert('Load chat: ${chat}')" title="${chat}">
                        ${chat}...
                    </div>`
            ).join('');
        }

        function startNewChat() {
            messages = [
                { role: "system", content: "You are NEO-ULTRA, a professional, high-level AI assistant. You provide concise, expert-level answers and write clean code." }
            ];
            scroller.innerHTML = '';

            const welcome = document.createElement('div');
            welcome.className = 'welcome-container';
            welcome.innerHTML = `
                    <div class="welcome-icon">🧠</div>
                    <div class="welcome-title">New Session Started</div>
                    <div class="welcome-desc">Ready for your next query...</div>
                `;
            scroller.appendChild(welcome);

            input.focus();
            currentSessionId = Date.now();
        }

        // Load history on startup
        const saved = localStorage.getItem('neo-chat-history');
        if (saved) {
            chatSessions = JSON.parse(saved);
            updateHistoryUI();
        }
    </script>

</body>
</html>
