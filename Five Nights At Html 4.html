<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FNAF 4 | Definitive Nightmare</title>
    <style>
        :root {
            --glitch: #300;
            --door-speed: 0.25s;
        }

        body {
            margin: 0;
            background: #000;
            color: #fff;
            font-family: 'Garamond', serif;
            overflow: hidden;
            user-select: none;
        }

        /* SCREEN LAYERS */
        .screen {
            position: absolute;
            inset: 0;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            background: #000;
        }

        .active {
            display: flex;
        }

        /* MAIN MENU */
        #main-menu {
            background: radial-gradient(circle, #1a0000 0%, #000 100%);
        }

        .title {
            font-size: 4rem;
            color: #600;
            text-shadow: 0 0 20px #f00;
            margin-bottom: 50px;
            animation: flicker 4s infinite;
        }

        .m-btn {
            background: none;
            border: 1px solid #444;
            color: #888;
            padding: 15px 60px;
            margin: 10px;
            cursor: pointer;
            transition: 0.3s;
            font-size: 1.2rem;
        }

            .m-btn:hover {
                color: #fff;
                border-color: #fff;
                box-shadow: 0 0 15px #fff;
            }

        /* PAUSE MENU */
        #pause-menu {
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(5px);
            z-index: 2000;
        }

        /* 3D ROOM ENGINE */
        #viewport {
            width: 100vw;
            height: 100vh;
            perspective: 1000px;
            display: none;
        }

        #room {
            width: 800px;
            height: 500px;
            position: absolute;
            left: 50%;
            top: 50%;
            margin-left: -400px;
            margin-top: -250px;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .wall {
            position: absolute;
            width: 800px;
            height: 500px;
            background: #111;
            border: 5px solid #050505;
            display: flex;
            align-items: center;
            justify-content: center;
            backface-visibility: hidden;
            box-shadow: inset 0 0 100px #000;
        }

        /* Wall Placements */
        #front {
            transform: translateZ(-400px);
            background: #151515;
        }
        /* Closet */
        #left {
            transform: rotateY(90deg) translateZ(-400px);
        }

        #right {
            transform: rotateY(-90deg) translateZ(-400px);
        }

        #back {
            transform: rotateY(180deg) translateZ(-400px);
        }
        /* Bed */

        /* DOOR ANIMATION SYSTEM */
        .door-frame {
            width: 200px;
            height: 400px;
            background: #000;
            position: relative;
            overflow: hidden;
            border: 4px solid #222;
        }

        .door-panel {
            position: absolute;
            inset: 0;
            background: #1a1005;
            border-right: 5px solid #000;
            transform: translateX(-100%);
            transition: transform var(--door-speed) ease-in;
        }

        .door-closed .door-panel {
            transform: translateX(0);
        }

        /* LIGHTS & FX */
        #flashlight {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle, rgba(255,255,255,0.15) 0%, #000 60%);
            opacity: 0;
            pointer-events: none;
            z-index: 500;
        }

        #vignette {
            position: fixed;
            inset: 0;
            box-shadow: inset 0 0 300px #000;
            pointer-events: none;
            z-index: 600;
        }

        @keyframes flicker {
            0%, 19%, 21%, 23%, 25%, 54%, 56%, 100% {
                opacity: 1;
            }

            20%, 24%, 55% {
                opacity: 0.2;
            }
        }

        /* UI STRIP */
        .ui-nav {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
            z-index: 1500;
        }

        .ui-btn {
            background: rgba(20,20,20,0.8);
            color: #555;
            border: 1px solid #333;
            padding: 12px;
            cursor: pointer;
        }

            .ui-btn:hover {
                color: #fff;
            }
    </style>
</head>
<body>

    <div id="vignette"></div>
    <div id="flashlight"></div>

    <div id="main-menu" class="screen active">
        <h1 class="title">THE FINAL CHAPTER</h1>
        <button class="m-btn" onclick="setState('GAME')">NEW NIGHT</button>
        <button class="m-btn">CONTINUE</button>
        <button class="m-btn">EXTRAS</button>
    </div>

    <div id="pause-menu" class="screen">
        <h1 style="color: #600;">NIGHT PAUSED</h1>
        <button class="m-btn" onclick="setState('GAME')">RESUME</button>
        <button class="m-btn" onclick="location.reload()">QUIT</button>
    </div>

    <div id="viewport">
        <div id="room">
            <div class="wall" id="front">
                <h3>CLOSET</h3>
                <div class="door-frame" id="closet-frame">
                    <div class="door-panel"></div>
                </div>
            </div>
            <div class="wall" id="left">
                <h3>LEFT HALL</h3>
                <div class="door-frame" id="left-door-frame">
                    <div class="door-panel"></div>
                </div>
                <p style="font-size: 0.8rem; color: #333;">[HOLD SHIFT TO CLOSE]</p>
            </div>
            <div class="wall" id="right">
                <h3>RIGHT HALL</h3>
                <div class="door-frame" id="right-door-frame">
                    <div class="door-panel"></div>
                </div>
                <p style="font-size: 0.8rem; color: #333;">[HOLD SHIFT TO CLOSE]</p>
            </div>
            <div class="wall" id="back">
                <h3>THE BED</h3>
                <div id="freddles-count" style="font-size: 3rem;"></div>
            </div>
        </div>

        <div class="ui-nav">
            <button class="ui-btn" onclick="pivot('L')">LEFT</button>
            <button class="ui-btn" onclick="pivot('F')">FRONT</button>
            <button class="ui-btn" onclick="pivot('R')">RIGHT</button>
            <button class="ui-btn" onclick="pivot('B')">BACK</button>
        </div>
    </div>

    <script>
        /** --- AUDIO GENERATOR --- **/
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSound(f, v, d, type = 'triangle') {
            const o = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            o.type = type; o.frequency.setValueAtTime(f, audioCtx.currentTime);
            g.gain.setValueAtTime(v, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + d);
            o.connect(g); g.connect(audioCtx.destination);
            o.start(); o.stop(audioCtx.currentTime + d);
        }

        /** --- STATE & VARIABLES --- **/
        let gameState = 'MENU'; // MENU, GAME, PAUSE
        let currentFacing = 'F';
        let isLightOn = false, isDoorClosed = false;
        let nightmarePos = null, breathing = false, freddles = 0;

        function setState(s) {
            document.querySelectorAll('.screen').forEach(scr => scr.classList.remove('active'));
            document.getElementById('viewport').style.display = (s === 'GAME') ? 'block' : 'none';
            if (s === 'MENU') document.getElementById('main-menu').classList.add('active');
            if (s === 'PAUSE') document.getElementById('pause-menu').classList.add('active');
            gameState = s;
            if (s === 'GAME' && !aiRunning) startAI();
        }

        /** --- MECHANICS --- **/
        function pivot(dir) {
            if (gameState !== 'GAME' || isDoorClosed) return;
            currentFacing = dir;
            const rm = document.getElementById('room');
            const deg = { 'F': 0, 'L': -90, 'R': 90, 'B': 180 };
            rm.style.transform = `rotateY(${deg[dir]}deg)`;
            playSound(80, 0.1, 0.3);
        }

        function toggleDoor(closed) {
            if (currentFacing === 'B' || currentFacing === 'F') return;
            isDoorClosed = closed;
            const frameId = currentFacing === 'L' ? 'left-door-frame' : 'right-door-frame';
            const el = document.getElementById(frameId);
            if (closed) {
                el.classList.add('door-closed');
                playSound(40, 0.2, 0.1, 'square');
            } else {
                el.classList.remove('door-closed');
                playSound(60, 0.1, 0.2);
            }
        }

        window.addEventListener('keydown', e => {
            if (gameState !== 'GAME') {
                if (e.key === "Escape" && gameState === 'PAUSE') setState('GAME');
                return;
            }
            if (e.key === "Escape") setState('PAUSE');
            if (e.code === "ControlLeft" && !isDoorClosed) {
                isLightOn = true;
                document.getElementById('flashlight').style.opacity = "1";
                checkFlashlight();
            }
            if (e.code === "ShiftLeft") toggleDoor(true);
        });

        window.addEventListener('keyup', e => {
            if (e.code === "ControlLeft") {
                isLightOn = false;
                document.getElementById('flashlight').style.opacity = "0";
            }
            if (e.code === "ShiftLeft") toggleDoor(false);
        });

        /** --- AI ENGINE --- **/
        let aiRunning = false;
        function startAI() {
            aiRunning = true;
            setInterval(() => {
                if (gameState !== 'GAME') return;

                // Move Nightmare
                if (!nightmarePos && Math.random() > 0.8) {
                    nightmarePos = Math.random() > 0.5 ? 'L' : 'R';
                    breathing = true;
                    console.log("Something at " + nightmarePos);
                }

                // Breathing Sound
                if (breathing && Math.random() > 0.4) {
                    setTimeout(() => playSound(50, 0.02, 1.5, 'sine'), 500);
                }

                // Freddles buildup
                if (currentFacing !== 'B') {
                    freddles++;
                    if (freddles > 15) jumpscare("BED FAILURE");
                } else {
                    if (isLightOn) freddles = Math.max(0, freddles - 2);
                }
            }, 3000);
        }

        function checkFlashlight() {
            if (isLightOn && nightmarePos === currentFacing && breathing) {
                jumpscare("NIGHTMARE");
            } else if (isLightOn && nightmarePos === currentFacing && !breathing) {
                nightmarePos = null;
                playSound(200, 0.1, 0.5); // Scuttling away
            }
        }

        function jumpscare(who) {
            gameState = 'OVER';
            document.body.innerHTML = `<div style="background:#200; height:100vh; display:flex; align-items:center; justify-content:center; color:red; font-size:3rem;">${who} KILLED YOU</div>`;
            playSound(30, 0.5, 2, 'sawtooth');
            setTimeout(() => location.reload(), 3000);
        }
    </script>
</body>
</html>
